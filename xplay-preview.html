<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XPLAY — Animation Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A1520; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 32px 20px 48px; min-height: 100vh; }
  h1 { color: #CDFF65; font-size: 13px; letter-spacing: 4px; margin-bottom: 6px; }
  p.sub { color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 2px; margin-bottom: 28px; font-family: monospace; }
  .tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
  .tab { background: none; border: none; border-radius: 7px; padding: 8px 16px; font-family: 'Arial Black', sans-serif; font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.4); cursor: pointer; }
  .tab.active { background: #CDFF65; color: #1A2833; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .phone { width: 240px; height: 426px; border-radius: 28px; border: 2px solid rgba(255,255,255,0.1); background: #1A2833; overflow: hidden; position: relative; box-shadow: 0 0 60px rgba(89,36,198,0.3), 0 0 120px rgba(0,0,0,0.8); }
  .phone-notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 56px; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.1); z-index: 10; }
  .controls { display: flex; align-items: center; gap: 8px; width: 240px; }
  .btn-play { background: #CDFF65; border: none; border-radius: 20px; padding: 7px 16px; font-family: 'Arial Black', sans-serif; font-size: 10px; color: #1A2833; cursor: pointer; min-width: 72px; }
  .btn-play.paused { background: #FFBF00; }
  .btn-reset { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 7px 10px; font-size: 11px; color: rgba(255,255,255,0.5); cursor: pointer; }
  .time { margin-left: auto; font-family: monospace; font-size: 10px; color: rgba(255,255,255,0.35); }
  .scrubber { width: 240px; }
  input[type=range] { width: 100%; accent-color: #CDFF65; cursor: pointer; }
  .tick-row { display: flex; justify-content: space-between; margin-top: 2px; }
  .tick { font-family: monospace; font-size: 9px; color: rgba(255,255,255,0.2); }
  /* ── canvas fills phone ── */
  canvas { width: 100%; height: 100%; }
  /* ── timeline legend ── */
  .legend { margin-top: 20px; max-width: 260px; width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 14px; }
  .legend h3 { color: #CDFF65; font-size: 9px; letter-spacing: 2px; margin-bottom: 8px; font-family: monospace; }
  .legend-row { display: flex; gap: 10px; margin-bottom: 4px; }
  .legend-t { font-family: monospace; font-size: 8px; color: #FFBF00; min-width: 48px; }
  .legend-d { font-size: 9px; color: rgba(255,255,255,0.45); }
</style>
</head>
<body>

<h1>XPLAY ANIMATION PREVIEW</h1>
<p class="sub">REMOTION STUDIO · REVIEW BEFORE APPLYING TO APP</p>

<div class="tabs">
  <button class="tab active" onclick="switchAnim('splash',this)">01 · SPLASH SCREEN</button>
  <button class="tab" onclick="switchAnim('postmatch',this)">02 · POST-MATCH STATS</button>
</div>

<div class="stage">
  <div class="phone">
    <div class="phone-notch"></div>
    <canvas id="cv" width="1080" height="1920"></canvas>
  </div>
  <div class="controls">
    <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶ PLAY</button>
    <button class="btn-reset" onclick="resetAnim()">↺</button>
    <span class="time" id="timeDisplay">0.0s</span>
  </div>
  <div class="scrubber">
    <input type="range" id="scrubber" min="0" max="149" value="0" oninput="scrub(this.value)">
    <div class="tick-row">
      <span class="tick">0s</span>
      <span class="tick" id="frameDisplay">f0</span>
      <span class="tick" id="totalDisplay">5s</span>
    </div>
  </div>
</div>

<div class="legend" id="legend"></div>

const C = { bg:'#1A2833', purple:'#5924C6', lime:'#CDFF65', orange:'#FFBF00', blue:'#ADBFF0', white:'#FFFFFF', card:'#0F1D27', loss:'#FF4D4D' };
const FPS = 30;
let frame = 0, playing = false, currentAnim = 'splash', raf = null, lastT = null;

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function lerp(a,b,t){return a+(b-a)*t;}
function interp(v,[i0,i1],[o0,o1],clamped=true){
  let t=(v-i0)/(i1-i0);
  if(clamped)t=clamp(t,0,1);
  return lerp(o0,o1,t);
}
function easeOutCubic(t){return 1-(1-t)**3;}
function easeOutQuad(t){return 1-(1-t)**2;}
function springVal(f,fps,{damping=14,stiffness=120,mass=1}={}){
  if(f<=0)return 0;
  const w0=Math.sqrt(stiffness/mass),z=damping/(2*Math.sqrt(stiffness*mass)),t=f/fps;
  if(z<1){const wd=w0*Math.sqrt(1-z*z);return clamp(1-Math.exp(-z*w0*t)*(Math.cos(wd*t)+(z/Math.sqrt(1-z*z))*Math.sin(wd*t)),0,1);}
  return clamp(1-Math.exp(-w0*t)*(1+w0*t),0,1);
}
function hex(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];}
function rgba(h,a){const[r,g,b]=hex(h);return `rgba(${r},${g},${b},${a})`;}

/* ───────────────────────────────── SPLASH ─── */
function drawSplash(ctx, f){
  const W=1080,H=1920,fps=FPS;
  ctx.clearRect(0,0,W,H);
  const bgOp=clamp(interp(f,[0,20],[0,1]),0,1);
  ctx.globalAlpha=bgOp;
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);
  // grid
  const gridOp=clamp(interp(f,[5,30],[0,1]),0,1)*bgOp;
  ctx.globalAlpha=gridOp*0.06;
  ctx.strokeStyle=C.lime; ctx.lineWidth=1;
  for(let x=0;x<W;x+=90){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=90){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // purple glow top-left
  ctx.globalAlpha=gridOp*0.18;
  const g1=ctx.createRadialGradient(-100,0,0,200,300,600);
  g1.addColorStop(0,C.purple); g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1; ctx.fillRect(0,0,W,H);
  // orange glow bottom-right
  const g2=ctx.createRadialGradient(W+80,H,0,W-200,H-300,500);
  g2.addColorStop(0,C.orange); g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);
  // particles
  const pts=[{x:.08,y:.12,s:10,d:0,c:C.lime},{x:.82,y:.07,s:8,d:5,c:C.orange},{x:.55,y:.78,s:12,d:8,c:C.purple},{x:.91,y:.42,s:8,d:3,c:C.lime},{x:.28,y:.91,s:10,d:11,c:C.orange},{x:.70,y:.28,s:8,d:6,c:C.purple},{x:.18,y:.62,s:12,d:2,c:C.lime},{x:.88,y:.85,s:8,d:9,c:C.orange}];
  pts.forEach((p,i)=>{
    const op=clamp(interp(f,[p.d,p.d+22],[0,0.6]),0,0.6);
    const pulse=1+0.2*Math.sin((f/fps)*Math.PI+i);
    ctx.globalAlpha=op*bgOp;
    ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.s*pulse,0,Math.PI*2); ctx.fill();
  });
  // vignette
  ctx.globalAlpha=bgOp;
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.7);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  // logo spring-in
  const logoSp=springVal(Math.max(0,f-15),fps,{damping:11,stiffness:90,mass:.9});
  const logoScale=lerp(0.3,1,logoSp);
  const logoOp=clamp(interp(f,[15,38],[0,1]),0,1);
  const logoGlow=30+14*Math.sin((f/fps)*Math.PI*1.4);
  if(logoOp>0 && LOGO_FULL.complete){
    const lw=320,lh=320;
    const lx=W/2-lw/2,ly=H/2-lh/2-80;
    ctx.save();
    ctx.globalAlpha=logoOp*bgOp;
    ctx.shadowColor=C.lime; ctx.shadowBlur=logoGlow;
    ctx.translate(W/2,ly+lh/2);
    ctx.scale(logoScale,logoScale);
    ctx.drawImage(LOGO_FULL,-lw/2,-lh/2,lw,lh);
    ctx.restore();
  }
  // loading bar
  const barOp=clamp(interp(f,[58,70],[0,1]),0,1);
  const barPct=clamp(interp(f,[65,115],[0,100],false,easeOutCubic),0,100);
  if(barOp>0){
    const bw=320,bh=4,bx=W/2-bw/2,by=H/2+130;
    const barR=Math.round(lerp(0xCD,0xFF,barPct/100));
    const barG=Math.round(lerp(0xFF,0xBF,barPct/100));
    const barB=Math.round(lerp(0x65,0x00,barPct/100));
    const barColor=`rgb(${barR},${barG},${barB})`;
    ctx.globalAlpha=barOp*bgOp;
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,2); ctx.fill();
    if(barPct>0){
      ctx.fillStyle=barColor;
      ctx.shadowColor=barColor; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.roundRect(bx,by,bw*(barPct/100),bh,2); ctx.fill();
    }
    ctx.shadowBlur=0;
  }
  // tagline
  const tagOp=clamp(interp(f,[108,128],[0,1]),0,1);
  const tagY=lerp(20,0,easeOutQuad(clamp(interp(f,[108,128],[0,1]),0,1)));
  if(tagOp>0){
    ctx.globalAlpha=tagOp*bgOp;
    ctx.fillStyle=C.blue;
    ctx.font='600 22px Arial';
    ctx.textAlign='center';
    ctx.letterSpacing='6px';
    ctx.fillText('YOUR GAME. YOUR CLUB.',W/2,H/2+190+tagY);
    ctx.letterSpacing='0px';
  }
  // bottom glow
  const bottomOp=barOp*(barPct/100);
  if(bottomOp>0){
    const bg3=ctx.createLinearGradient(0,0,W,0);
    bg3.addColorStop(0,'transparent'); bg3.addColorStop(0.5,C.lime); bg3.addColorStop(0.75,C.orange); bg3.addColorStop(1,'transparent');
    ctx.globalAlpha=bottomOp*bgOp;
    ctx.fillStyle=bg3; ctx.fillRect(0,H-2,W,2);
  }
  ctx.globalAlpha=1;
}

/* ───────────────────────────────── POST-MATCH ─── */
function drawPostMatch(ctx,f){
  const W=1080,H=1920,fps=FPS;
  ctx.clearRect(0,0,W,H);
  const bgOp=clamp(interp(f,[0,12],[0,1]),0,1);
  ctx.globalAlpha=bgOp;
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,W,H);
  // bg glows
  ctx.globalAlpha=bgOp*0.15;
  const g1=ctx.createRadialGradient(W/2,0,0,W/2,0,700);
  g1.addColorStop(0,C.lime); g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=bgOp*0.12;
  const g2=ctx.createRadialGradient(W/2,H,0,W/2,H,600);
  g2.addColorStop(0,C.purple); g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);
  // grid
  ctx.globalAlpha=bgOp*0.04;
  ctx.strokeStyle=C.lime; ctx.lineWidth=1;
  for(let x=0;x<W;x+=90){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=90){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // RESULT slam
  const resSp=springVal(Math.max(0,f-2),fps,{damping:10,stiffness:160,mass:1.1});
  const resY=lerp(-340,0,resSp);
  const resOp=clamp(interp(f,[2,16],[0,1]),0,1);
  const resGlow=28+14*Math.sin((f/fps)*Math.PI*1.2);

  ctx.save();
  ctx.globalAlpha=resOp*bgOp;
  ctx.translate(0,resY);
  // mini logo
  if(LOGO_FULL.complete){
    const lw=110,lh=110,lx=W/2-lw/2,ly=80;
    ctx.drawImage(LOGO_FULL,lx,ly,lw,lh);
  }
  // player name
  ctx.fillStyle=C.blue; ctx.font='700 28px Arial'; ctx.textAlign='center';
  ctx.fillText('NACHO R.',W/2,235);
  // VICTORY box
  ctx.shadowColor=C.lime; ctx.shadowBlur=resGlow;
  ctx.strokeStyle=C.lime; ctx.lineWidth=4;
  const vx=W/2-280,vy=258,vw=560,vh=108;
  ctx.fillStyle=rgba(C.lime,0.08);
  ctx.beginPath(); ctx.roundRect(vx,vy,vw,vh,18); ctx.fill();
  ctx.beginPath(); ctx.roundRect(vx,vy,vw,vh,18); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle=C.lime; ctx.font='900 84px "Arial Black"'; ctx.textAlign='center';
  ctx.fillText('VICTORY',W/2,348);
  ctx.restore();

  // SCORE
  const scoreOp=clamp(interp(f,[30,50],[0,1]),0,1);
  const scoreSp=springVal(Math.max(0,f-30),fps,{damping:14,stiffness:100});
  const scoreScl=lerp(0.65,1,scoreSp);
  const scA=Math.round(clamp(interp(f,[35,72],[0,3],false,easeOutCubic),0,3));
  const scB=Math.round(clamp(interp(f,[46,76],[0,1],false,easeOutCubic),0,1));
  ctx.save();
  ctx.globalAlpha=scoreOp*bgOp;
  ctx.translate(W/2,520); ctx.scale(scoreScl,scoreScl); ctx.translate(-W/2,-520);
  ctx.font='900 140px "Arial Black"'; ctx.textAlign='center';
  ctx.fillStyle=C.lime; ctx.fillText(scA,W/2-140,590);
  ctx.fillStyle=rgba(C.blue,0.5); ctx.font='300 80px Arial'; ctx.fillText('–',W/2,578);
  ctx.fillStyle=rgba(C.blue,0.6); ctx.font='900 140px "Arial Black"'; ctx.fillText(scB,W/2+140,590);
  ctx.fillStyle=C.blue; ctx.font='600 22px Arial'; ctx.fillText('FINAL SCORE',W/2,636);
  ctx.restore();

  // stat cards
  function statCard(label,value,accent,i,delay){
    const sp=springVal(Math.max(0,f-(80+delay)),fps,{damping:14,stiffness:85});
    const dx=lerp(-70,0,sp);
    const op=clamp(interp(f,[80+delay,80+delay+18],[0,1]),0,1);
    const col=i%2; const row=Math.floor(i/2);
    const cw=468,ch=148,gap=24,px=60;
    const cx=px+(cw+gap)*col+dx,cy=700+(ch+gap)*row;
    ctx.save(); ctx.globalAlpha=op*bgOp;
    // card bg
    ctx.fillStyle=C.card;
    ctx.beginPath(); ctx.roundRect(cx,cy,cw,ch,24); ctx.fill();
    ctx.strokeStyle=rgba(accent,0.2); ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(cx,cy,cw,ch,24); ctx.stroke();
    // value
    ctx.fillStyle=accent; ctx.font='900 56px "Arial Black"'; ctx.textAlign='center';
    ctx.fillText(value,cx+cw/2,cy+75);
    // label
    ctx.fillStyle=C.blue; ctx.font='700 18px Arial';
    ctx.fillText(label.toUpperCase(),cx+cw/2,cy+114);
    ctx.restore();
  }
  const rV=(clamp(interp(f,[88,145],[0,8.5]),0,8.5)).toFixed(1);
  const gV=Math.round(clamp(interp(f,[100,148],[0,2]),0,2));
  const aV=Math.round(clamp(interp(f,[112,151],[0,1]),0,1));
  const sV=Math.round(clamp(interp(f,[124,154],[0,6]),0,6));
  statCard('Rating',rV,C.orange,0,0);
  statCard('Goals',gV,C.lime,1,14);
  statCard('Assists',aV,C.lime,2,28);
  statCard('Shots',sV,C.blue,3,42);

  // XP bar
  const xpOp=clamp(interp(f,[160,178],[0,1]),0,1);
  const xpPct=clamp(interp(f,[170,218],[0,100]),0,100);
  const xpVal=Math.round(clamp(interp(f,[172,216],[0,450]),0,450));
  if(xpOp>0){
    ctx.globalAlpha=xpOp*bgOp;
    const bx=60,by=1140,bw=960;
    ctx.fillStyle=C.card;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,120,16); ctx.fill();
    ctx.fillStyle=C.blue; ctx.font='700 22px Arial'; ctx.textAlign='left';
    ctx.fillText('XP EARNED',bx+24,by+44);
    ctx.fillStyle=C.orange; ctx.font='900 44px "Arial Black"'; ctx.textAlign='right';
    ctx.fillText('+'+xpVal,bx+bw-24,by+50);
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.roundRect(bx+24,by+62,bw-48,14,7); ctx.fill();
    if(xpPct>0){
      const xpGlow=10+5*Math.sin((f/FPS)*Math.PI*2.5);
      const xpGrad=ctx.createLinearGradient(bx+24,0,bx+24+(bw-48)*(xpPct/100),0);
      xpGrad.addColorStop(0,C.purple); xpGrad.addColorStop(1,C.orange);
      ctx.fillStyle=xpGrad;
      ctx.shadowColor=C.orange; ctx.shadowBlur=xpGlow;
      ctx.beginPath(); ctx.roundRect(bx+24,by+62,(bw-48)*(xpPct/100),14,7); ctx.fill();
      ctx.shadowBlur=0;
    }
    ctx.fillStyle=rgba(C.blue,0.5); ctx.font='500 18px Arial'; ctx.textAlign='left';
    ctx.fillText('Level 12',bx+24,by+102);
    ctx.textAlign='right';
    ctx.fillText('2 450 / 3 000 XP',bx+bw-24,by+102);
  }

  // MVP
  const mvpSp=springVal(Math.max(0,f-222),fps,{damping:9,stiffness:95,mass:1.2});
  const mvpY=lerp(-90,0,mvpSp);
  const mvpOp=clamp(interp(f,[222,240],[0,1]),0,1);
  const mvpGlow=22+12*Math.sin((f/FPS)*Math.PI*1.5);
  if(mvpOp>0){
    ctx.save(); ctx.globalAlpha=mvpOp*bgOp;
    ctx.translate(0,mvpY);
    const mx=W/2-240,my=1370,mw=480,mh=80;
    ctx.shadowColor=C.orange; ctx.shadowBlur=mvpGlow;
    ctx.strokeStyle=rgba(C.orange,0.6); ctx.lineWidth=2;
    ctx.fillStyle=rgba(C.orange,0.1);
    ctx.beginPath(); ctx.roundRect(mx,my,mw,mh,40); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle=C.orange; ctx.font='800 32px "Arial Black"'; ctx.textAlign='center';
    ctx.fillText('⭐ MVP OF THE MATCH',W/2,my+52);
    ctx.restore();
  }

  // CTA
  const ctaOp=clamp(interp(f,[270,292],[0,1]),0,1);
  const ctaPulse=1+0.028*Math.sin((f/FPS)*Math.PI*3);
  if(ctaOp>0){
    ctx.save(); ctx.globalAlpha=ctaOp*bgOp;
    ctx.translate(W/2,1810); ctx.scale(ctaPulse,ctaPulse); ctx.translate(-W/2,-1810);
    const grad=ctx.createLinearGradient(60,0,W-60,0);
    grad.addColorStop(0,C.purple); grad.addColorStop(1,C.lime);
    ctx.fillStyle=grad;
    ctx.shadowColor=C.purple; ctx.shadowBlur=28;
    ctx.beginPath(); ctx.roundRect(60,1764,W-120,92,22); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=C.bg; ctx.font='800 32px "Arial Black"'; ctx.textAlign='center';
    ctx.fillText('See Full Stats  →',W/2,1820);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

/* ─── RUNTIME ─── */
const cv=document.getElementById('cv');
const c2=cv.getContext('2d');
const scrEl=document.getElementById('scrubber');

const ANIMS={splash:{frames:150,draw:drawSplash},postmatch:{frames:330,draw:drawPostMatch}};

function render(){
  const a=ANIMS[currentAnim];
  a.draw(c2,frame);
  document.getElementById('timeDisplay').textContent=(frame/FPS).toFixed(1)+'s';
  document.getElementById('frameDisplay').textContent='f'+frame;
  scrEl.value=frame;
}

function tick(t){
  if(!playing)return;
  if(!lastT)lastT=t;
  const dt=t-lastT;
  const fpd=1000/FPS;
  if(dt>=fpd){
    frame=(frame+Math.floor(dt/fpd))%ANIMS[currentAnim].frames;
    lastT=t-(dt%fpd);
    render();
  }
  raf=requestAnimationFrame(tick);
}

function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('btnPlay');
  btn.textContent=playing?'⏸ PAUSE':'▶ PLAY';
  btn.className=playing?'btn-play paused':'btn-play';
  if(playing){lastT=null;raf=requestAnimationFrame(tick);}
  else if(raf)cancelAnimationFrame(raf);
}

function resetAnim(){
  playing=false;
  if(raf)cancelAnimationFrame(raf);
  document.getElementById('btnPlay').textContent='▶ PLAY';
  document.getElementById('btnPlay').className='btn-play';
  frame=0; lastT=null; render();
}

function scrub(v){
  frame=parseInt(v);
  lastT=null;
  render();
}

function switchAnim(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentAnim=name;
  resetAnim();
  const a=ANIMS[name];
  scrEl.max=a.frames-1;
  document.getElementById('totalDisplay').textContent=(a.frames/FPS).toFixed(0)+'s';
  updateLegend(name);
}

function updateLegend(name){
  const legends={
    splash:[['0–20','BG + grid fades in'],['15–50','Logo springs in with lime glow'],['60–115','Loading bar fills (lime → orange)'],['108–128','Tagline slides up'],['130–150','Hold']],
    postmatch:[['0–30','VICTORY slams in'],['30–80','Score counts up 3–1'],['80–160','Stat cards stagger in'],['160–220','XP bar fills (purple → orange)'],['220–270','MVP badge bounces in'],['270–300','CTA pulses in']]
  };
  const el=document.getElementById('legend');
  el.innerHTML='<h3>'+(name==='splash'?'SPLASH':'POST-MATCH')+' TIMELINE</h3>'+
    legends[name].map(([t,d])=>`<div class="legend-row"><span class="legend-t">${t}</span><span class="legend-d">${d}</span></div>`).join('');
}

// init
LOGO_FULL.onload=()=>render();
if(LOGO_FULL.complete)render();
updateLegend('splash');
</script>
